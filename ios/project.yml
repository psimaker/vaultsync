name: VaultSync
options:
  bundleIdPrefix: eu.vaultsync
  developmentLanguage: en
  deploymentTarget:
    iOS: "18.0"
  useBaseInternationalization: true
  xcodeVersion: "26.4"
  generateEmptyDirectories: true
  postGenCommand: |
    ruby -e '
      path = "VaultSync.xcodeproj/project.pbxproj"
      text = File.read(path)
      text.sub!(
        /knownRegions = \(\n\s*Base,\n\s*en,\n\s*\);/,
        "knownRegions = (\n\t\t\t\tBase,\n\t\t\t\tde,\n\t\t\t\ten,\n\t\t\t\tes,\n\t\t\t\t\"zh-Hans\",\n\t\t\t);"
      )
      File.write(path, text)
    '

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Required: gomobile's xcframework build uses shell scripts in a Run Script phase.
    # User script sandboxing must be disabled so Xcode can execute them.
    ENABLE_USER_SCRIPT_SANDBOXING: false

# Signing comes from Signing.xcconfig (committed, no team), which optionally
# includes a gitignored Signing.local.xcconfig for your own DEVELOPMENT_TEAM.
# This survives `xcodegen generate` without committing a team or forcing one on
# contributors — copy Signing.local.xcconfig.example to Signing.local.xcconfig.
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

schemes:
  VaultSync:
    build:
      targets:
        VaultSync: all
    run:
      config: Debug
      storeKitConfiguration: VaultSync.storekit
    test:
      config: Debug
      targets:
        - VaultSyncTests
    archive:
      config: Release

targets:
  VaultSync:
    type: application
    platform: iOS
    sources:
      - path: VaultSync
        excludes:
          - "**/.gitkeep"
    info:
      path: VaultSync/Info.plist
      properties:
        CFBundleShortVersionString: "1.5.1"
        CFBundleVersion: "27"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: eu.vaultsync.app
            CFBundleURLSchemes:
              - vaultsync
        BGTaskSchedulerPermittedIdentifiers:
          - eu.vaultsync.app.sync-refresh
          - eu.vaultsync.app.sync-continued
        NSCameraUsageDescription: "VaultSync uses the camera to scan Syncthing device QR codes for easy setup."
        # NOTE: NSAppTransportSecurity is deliberately NOT set, so shipping (Release)
        # builds keep the strictest ATS posture. The production app only talks HTTPS to
        # the relay. The DEBUG mock-relay loop targets http://127.0.0.1 (loopback),
        # which ATS does NOT enforce against — a cleartext loopback load needs no ATS
        # exception at all. (NSAllowsLocalNetworking never governed numeric IP literals;
        # it only relaxes ATS for unqualified / .local *named* hosts — Apple DTS — so it
        # was never the key that made the 127.0.0.1 loop work. On iOS 17+, non-loopback
        # IP literals would need an NSExceptionDomains entry, but loopback stays exempt.)
        # For maximum robustness use the name "localhost" over the numeric literal in
        # the DEBUG RELAY_BASE_URL_OVERRIDE.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - fetch
          - processing
          - remote-notification
    entitlements:
      path: VaultSync/VaultSync.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.eu.vaultsync.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.vaultsync.app
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: VaultSyncWidget
      - framework: ../go/build/SyncBridge.xcframework
        embed: true

  VaultSyncWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: VaultSyncWidget
        excludes:
          - "**/.gitkeep"
      # Shared brand palette (Color.vaultTeal/.vaultSlate) so the widget
      # matches the app accent without redefining the RGB.
      - path: VaultSync/Resources/Theme.swift
    info:
      path: VaultSyncWidget/Info.plist
      properties:
        CFBundleShortVersionString: "1.5.1"
        CFBundleVersion: "27"
        CFBundleDisplayName: VaultSync Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: VaultSyncWidget/VaultSyncWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.eu.vaultsync.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.vaultsync.app.widget

  VaultSyncTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VaultSyncTests
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: VaultSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.vaultsync.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
