name: Docker

on:
  pull_request:
    branches: [main]
    paths:
      - "notify/**"
      - ".github/workflows/docker.yml"
      - ".github/workflows/ci.yml"
      - ".github/scripts/notify-publish-safety.rb"
  push:
    branches: [main]
    paths:
      - "notify/**"
      - ".github/workflows/docker.yml"
      - ".github/workflows/ci.yml"
      - ".github/scripts/notify-publish-safety.rb"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing notify-vX.Y.Z tag selected as the workflow ref"
        required: true
        type: string
      confirmation:
        description: "Type PUBLISH_NOTIFY_RELEASE to publish images and binaries"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # A second owner dispatch must queue behind an active publication instead of
  # cancelling it after only some outputs have reached GitHub.
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

# Validation receives no write token. Each publication job declares only the
# write scopes it needs after the separate read-only owner gate has succeeded.
permissions:
  contents: read

jobs:
  publish-safety-policy:
    name: Publish Safety Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Verify publication remains owner-gated
        run: ruby .github/scripts/notify-publish-safety.rb

  notify-guard:
    name: Notify Guard Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: notify/go.mod

      - name: Run notify test suite
        working-directory: notify
        run: go test ./... -count=1

  build-without-push:
    name: Build Image (no push)
    if: github.event_name != 'workflow_dispatch'
    needs:
      - publish-safety-policy
      - notify-guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build local validation image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: notify
          load: true
          push: false
          platforms: linux/amd64
          tags: vaultsync-notify:ci-${{ github.sha }}
          build-args: |
            VERSION=dev-${{ github.sha }}
          provenance: false
          sbom: false

      - name: Scan local validation image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: vaultsync-notify:ci-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  # This job has no write permission. It proves that the existing tag selected
  # as the dispatch ref, the explicit input, the actor, and origin/main all name
  # the same immutable release commit before either privileged job can start.
  publish-gate:
    name: Owner Publish Gate
    if: github.event_name == 'workflow_dispatch'
    needs:
      - publish-safety-policy
      - notify-guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate owner, tag, confirmation, and main ancestry
        id: validate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CONFIRMATION: ${{ inputs.confirmation }}
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          test "$EVENT_NAME" = workflow_dispatch
          test "$REF_TYPE" = tag
          test "$ACTOR" = "$REPOSITORY_OWNER"
          test "$TRIGGERING_ACTOR" = "$REPOSITORY_OWNER"
          test "$RELEASE_TAG" = "$REF_NAME"
          test "$CONFIRMATION" = PUBLISH_NOTIFY_RELEASE
          if [[ ! "$RELEASE_TAG" =~ ^notify-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release tag must be notify-vX.Y.Z" >&2
            exit 1
          fi
          resolved="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
          test "$resolved" = "$RELEASE_SHA"
          git show-ref --verify --quiet refs/remotes/origin/main
          git merge-base --is-ancestor "$RELEASE_SHA" refs/remotes/origin/main
          echo "version=${RELEASE_TAG#notify-v}" >> "$GITHUB_OUTPUT"

  publish-image:
    name: Publish Image
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref_type == 'tag' &&
      inputs.release_tag == github.ref_name &&
      inputs.confirmation == 'PUBLISH_NOTIFY_RELEASE' &&
      github.actor == github.repository_owner &&
      github.triggering_actor == github.repository_owner
    needs:
      - publish-safety-policy
      - notify-guard
      - publish-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write # push the two explicitly owner-approved GHCR tags
      id-token: write # keyless provenance identity for the published image
      attestations: write # attach BuildKit provenance and SBOM attestations
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        id: meta
        with:
          images: ghcr.io/psimaker/vaultsync-notify
          tags: |
            type=raw,value=${{ needs.publish-gate.outputs.version }}
            type=raw,value=latest

      - name: Build and publish release image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        id: build
        with:
          context: notify
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.publish-gate.outputs.version }}
          provenance: mode=max
          sbom: true

      - name: Scan published image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/psimaker/vaultsync-notify@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  # The owner dispatch is the publication action. This job never creates a tag;
  # --verify-tag requires the exact pre-existing tag already checked above.
  release-binaries:
    name: Publish Binaries
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref_type == 'tag' &&
      inputs.release_tag == github.ref_name &&
      inputs.confirmation == 'PUBLISH_NOTIFY_RELEASE' &&
      github.actor == github.repository_owner &&
      github.triggering_actor == github.repository_owner
    needs:
      - publish-safety-policy
      - notify-guard
      - publish-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # create the verified-tag release and upload its binaries
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: notify/go.mod
          cache: false

      - name: Cross-compile helper binaries
        working-directory: notify
        env:
          RELEASE_VERSION: ${{ needs.publish-gate.outputs.version }}
        run: |
          set -eu
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            export GOOS="${target%/*}" GOARCH="${target#*/}"
            out="dist/vaultsync-notify_${GOOS}_${GOARCH}"
            [ "$GOOS" = windows ] && out="$out.exe"
            CGO_ENABLED=0 go build -trimpath \
              -ldflags="-s -w -X main.version=${RELEASE_VERSION}" -o "$out" .
          done
          (cd dist && sha256sum -- * > SHA256SUMS)

      - name: Publish release with binaries
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -eu
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --verify-tag --latest=false \
              --title "vaultsync-notify ${RELEASE_TAG#notify-v}" \
              --notes "Prebuilt \`vaultsync-notify\` helper binaries for the [Cloud Relay server setup](https://github.com/${GITHUB_REPOSITORY}/blob/main/notify/README.md). The one-line installer picks these up automatically; verify manual downloads against \`SHA256SUMS\`."
          fi
          gh release upload "$RELEASE_TAG" --clobber notify/dist/*
